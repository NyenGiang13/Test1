<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Extreme Pitch Shifter Studio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { background: #1a1a1a; color: white; text-align: center; font-family: sans-serif; padding: 10px; }
        #piano { display: flex; overflow-x: auto; height: 160px; background: #000; padding: 5px; border-radius: 8px; margin-top: 15px; cursor: pointer; }
        .key { flex: 0 0 30px; border: 1px solid #333; }
        .white { background: #fff; }
        .black { background: #333; width: 22px; height: 100px; margin-left: -11px; margin-right: -11px; z-index: 2; }
        .key:active { background: #ff4757; }
        #controls { margin: 20px 0; background: #2f3542; padding: 20px; border-radius: 10px; display: inline-block; }
        button { padding: 12px 25px; margin: 5px; cursor: pointer; font-weight: bold; border: none; border-radius: 5px; }
        #recBtn { background: #2ed573; } #stopBtn { background: #ff4757; }
    </style>
</head>
<body>

    <h2>🎹 Custom Audio Instrument (A0-C8)</h2>
    <input type="file" id="audioUpload" accept="audio/*">
    
    <div id="controls">
        <button id="recBtn">Ghi âm</button>
        <button id="stopBtn" disabled>Dừng</button>
        <div id="timer" style="margin-top:10px;">0 giây</div>
    </div>

    <div id="piano"></div>
    <div id="output" style="margin-top:20px;"></div>

    <script>
        let player, recorder, chunks = [], startTime, timerInt;
        const dest = Tone.context.createMediaStreamDestination();

        // Tạo 88 phím
        const piano = document.getElementById('piano');
        for (let i = 0; i < 88; i++) {
            const isBlack = [1, 3, 6, 8, 10].includes(i % 12);
            const key = document.createElement('div');
            key.className = `key ${isBlack ? 'black' : 'white'}`;
            key.onmousedown = () => playKey(i);
            piano.appendChild(key);
        }

        document.getElementById('audioUpload').onchange = (e) => {
            const url = URL.createObjectURL(e.target.files[0]);
            player = new Tone.Player(url).connect(dest).toDestination();
        };

        function playKey(i) {
            if (!player) return alert("Chọn file âm thanh trước!");
            player.playbackRate = Math.pow(2, (i - 44) / 12); // Lấy phím 44 (A4) làm gốc
            player.start();
        }

        document.getElementById('recBtn').onclick = () => {
            chunks = [];
            recorder = new MediaRecorder(dest.stream);
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'audio/webm' });
                document.getElementById('output').innerHTML = `<a href="${URL.createObjectURL(blob)}" download="my_sound.webm">📥 Tải xuống</a> 
                <button onclick="this.parentElement.innerHTML=''">Xoá</button>`;
            };
            recorder.start();
            startTime = Date.now();
            timerInt = setInterval(() => {
                document.getElementById('timer').innerText = Math.floor((Date.now() - startTime)/1000) + " giây";
            }, 1000);
            document.getElementById('recBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
        };

        document.getElementById('stopBtn').onclick = () => {
            recorder.stop();
            clearInterval(timerInt);
            document.getElementById('recBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
        };
    </script>
</body>
</html>
