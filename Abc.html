<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Piano Studio Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #f0f2f5; padding: 20px; touch-action: manipulation; }
        #piano { display: flex; justify-content: center; margin-top: 20px; overflow-x: auto; padding-bottom: 20px; }
        .key { width: 30px; height: 150px; border: 1px solid #999; cursor: pointer; transition: background 0.1s; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); }
        .white { background: white; }
        .black { background: #333; width: 22px; height: 100px; margin-left: -11px; margin-right: -11px; z-index: 2; border-radius: 0 0 3px 3px; }
        .key:active { background: #ddd; }
        #controls { margin: 20px; background: white; padding: 15px; border-radius: 10px; display: inline-block; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; background: #007bff; color: white; font-weight: bold; }
        button:disabled { background: #ccc; }
        #timer { font-size: 1.2em; margin: 10px; color: #555; }
    </style>
</head>
<body>

    <h2>🎹 Piano Web Studio</h2>
    <input type="file" id="audioUpload" accept="audio/*">
    
    <div id="controls">
        <button id="recBtn">Ghi âm</button>
        <button id="stopBtn" disabled>Dừng</button>
        <div id="timer">Thời gian: 0s</div>
    </div>

    <div id="piano"></div>
    <div id="output"></div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let audioBuffer = null, mediaRecorder, chunks = [], startTime, timerInterval;
        const dest = audioCtx.createMediaStreamDestination();

        document.getElementById('audioUpload').onchange = async (e) => {
            const file = e.target.files[0];
            audioBuffer = await audioCtx.decodeAudioData(await file.arrayBuffer());
            alert("Đã tải âm thanh thành công!");
        };

        const piano = document.getElementById('piano');
        for (let i = 0; i < 88; i++) {
            const key = document.createElement('div');
            const isBlack = [1, 3, 6, 8, 10].includes(i % 12);
            key.className = `key ${isBlack ? 'black' : 'white'}`;
            key.onclick = () => playSound(i);
            piano.appendChild(key);
        }

        function playSound(index) {
            if (!audioBuffer) return alert("Vui lòng tải tệp âm thanh trước!");
            const source = audioCtx.createBufferSource();
            source.buffer = audioBuffer;
            source.playbackRate.value = Math.pow(2, (index - 44) / 12);
            source.connect(audioCtx.destination);
            source.connect(dest);
            source.start();
        }

        recBtn.onclick = () => {
            chunks = [];
            mediaRecorder = new MediaRecorder(dest.stream);
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'audio/webm' });
                document.getElementById('output').innerHTML = `
                    <p><a href="${URL.createObjectURL(blob)}" download="piano_track.webm">📥 Tải bản ghi của bạn</a></p>
                    <button onclick="this.parentElement.innerHTML=''">Xoá bản ghi</button>
                `;
            };
            mediaRecorder.start();
            startTime = Date.now();
            timerInterval = setInterval(() => {
                document.getElementById('timer').innerText = `Thời gian: ${Math.floor((Date.now() - startTime)/1000)}s`;
            }, 1000);
            recBtn.disabled = true; stopBtn.disabled = false;
        };

        stopBtn.onclick = () => {
            mediaRecorder.stop();
            clearInterval(timerInterval);
            recBtn.disabled = false; stopBtn.disabled = true;
        };
    </script>
</body>
</html>
