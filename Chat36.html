<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chat lỏ</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; height: 100dvh; overflow: hidden; background: #f0f2f5; font-family: sans-serif; }
        .app { width: 100%; max-width: 500px; height: 100dvh; display: flex; flex-direction: column; background: #fff; margin: 0 auto; position: relative; }
        header { background: #0084ff; color: #fff; padding: 12px; text-align: center; font-weight: bold; height: 50px; flex-shrink: 0; display: flex; justify-content: center; align-items: center; z-index: 100; position: relative; }
        #btn-logout { position: absolute; left: 10px; background: rgba(255,255,255,0.2); border: none; color: #fff; padding: 6px 12px; border-radius: 4px; font-size: 11px; cursor: pointer; }
        #admin-status { position: absolute; right: 15px; font-size: 14px; font-weight: bold; color: #FFD700; }
        #btn-announcement { position: absolute; right: 50px; background: #ff4757; border: none; color: #fff; padding: 5px 8px; border-radius: 50%; font-size: 14px; cursor: pointer; display: none; }
        #chat-box { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 12px; background: #fff; }
        .msg { padding: 8px 12px; border-radius: 15px; max-width: 85%; font-size: 14px; line-height: 1.4; word-wrap: break-word; position: relative; }
        .me { align-self: flex-end; background: #0084ff; color: #fff; border-bottom-right-radius: 2px; }
        .user { align-self: flex-start; background: #e4e6eb; color: #000; border-bottom-left-radius: 2px; }
        .adm-tag { color: #ff4757; font-weight: bold; margin-right: 4px; font-size: 10px; border: 1.5px solid #ff4757; padding: 1px 4px; border-radius: 4px; }
        .msg-info { display: flex; justify-content: space-between; align-items: center; font-size: 9px; margin-top: 4px; opacity: 0.7; }
        .tools { display: flex; gap: 10px; align-items: center; }
        .tool-btn { font-size: 12px; cursor: pointer; padding: 2px; }
        .edit-icon { color: #f1c40f; }
        .del-icon { color: #ff4757; font-weight: bold; }
        .admin-action { color: #0084ff; font-size: 14px; margin-left: 5px; cursor: pointer; }
        .input-area { padding: 10px; padding-bottom: max(10px, env(safe-area-inset-bottom)); border-top: 1px solid #ddd; display: flex; gap: 5px; background: #fff; align-items: center; flex-shrink: 0; }
        #msg { flex: 1; border-radius: 20px; padding: 10px 15px; border: 1px solid #ddd; outline: none; font-size: 16px; }
        .btn-send { border-radius: 20px; border: none; background: #0084ff; color: #fff; padding: 10px 20px; font-weight: bold; }
        #ban-info { width: 100%; background: #000; color: white; text-align: center; font-size: 12px; font-weight: bold; padding: 10px 0; display: none; z-index: 100; }
        .announcement { align-self: center; background: #fff3cd; color: #856404; width: 92%; border-radius: 8px; text-align: center; font-weight: bold; padding: 10px; font-size: 13px; margin: 10px 0; border: 1px solid #ffeeba; border-left: 5px solid #ff4757; }
        #action-modal, #login-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        #login-overlay { background: #f0f2f5; }
        .modal-box { background: #fff; padding: 25px; border-radius: 15px; width: 310px; text-align: center; }
        .hidden { display: none !important; }
        .admin-btn { width: 100%; padding: 12px; margin-bottom: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; }
        input[type="text"], input[type="password"], input[type="number"] { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; }
    </style>
</head>
<body>
    <div class="app">
        <div id="ban-info"></div>
        <div id="login-overlay">
            <div class="modal-box">
                <h2 id="auth-title" style="color:#0084ff; margin:0 0 15px 0;">Đăng Nhập</h2>
                <input type="text" id="auth-user" placeholder="Tên tài khoản...">
                <input type="password" id="auth-pass" placeholder="Mật khẩu...">
                <button onclick="handleAuth()" class="admin-btn" style="background:#0084ff;">VÀO PHÒNG CHAT</button>
                <button onclick="loginAnonymous()" class="admin-btn" style="background:#6c757d;">ẨN DANH</button>
                <p onclick="switchAuthMode()" id="auth-switch" style="font-size:12px; color:#0084ff; cursor:pointer; margin-top:10px; text-decoration:underline;">Đăng ký tài khoản</p>
            </div>
        </div>
        <div id="action-modal" class="hidden">
            <div class="modal-box">
                <h4 id="target-name">Quản lý người dùng</h4>
                <button onclick="setAdminRole()" class="admin-btn" style="background:#2ecc71;">TẶNG QUYỀN ADMIN</button>
                <hr>
                <input type="number" id="ban-custom" placeholder="Số phút khóa...">
                <button onclick="banUser(document.getElementById('ban-custom').value)" class="admin-btn" style="background:#ff4757;">XÁC NHẬN KHOÁ</button>
                <button onclick="document.getElementById('action-modal').classList.add('hidden')" class="admin-btn" style="background:#999; margin-top:10px;">ĐÓNG</button>
            </div>
        </div>
        <header> 
            <button id="btn-logout" onclick="logout()">Thoát</button>
            PHÒNG CHAT
            <button id="btn-announcement" onclick="adminSendAnnouncement()">📢</button>
            <span id="admin-status"></span> 
        </header>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="msg" placeholder="Nhập tin nhắn..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()" class="btn-send">Gửi</button>
        </div>
    </div>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBePJ8qaOtHcBSKak-gdVH2qnjZDekkgqI",
        authDomain: "chat-voi-nguoi-la12.firebaseapp.com",
        databaseURL: "https://chat-voi-nguoi-la12-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "chat-voi-nguoi-la12",
        storageBucket: "chat-voi-nguoi-la12.firebasestorage.app",
        messagingSenderId: "514146383665",
        appId: "1:514146383665:web:e9e0298c3ba1f3f8972210"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let name = "", isAdmin = false, isRegisterMode = false, isBanned = false, selectedUser = "";
    const chatBox = document.getElementById('chat-box');

    function initApp() { checkSavedLogin(); checkBanStatus(); listen(); }

    function renderMessage(key, d) {
        if (document.getElementById("msg-" + key)) return;
        const div = document.createElement('div');
        div.id = "msg-" + key;
        if(d.type === 'alert') {
            div.className = "announcement";
            div.innerHTML = `⚠️ ${d.c} ${(isAdmin) ? `<span class="tool-btn del-icon" onclick="del(event, '${key}')" style="float:right">x</span>` : ""}`;
        } else {
            div.className = `msg ${d.s === name ? 'me' : 'user'}`;
            let isTargetAdm = d.s.startsWith("ADMIN_"), cleanName = d.s.replace("ADMIN_", "");
            div.innerHTML = `<div style="font-size:10px; font-weight:bold; margin-bottom:3px; display:flex; justify-content:space-between;">
                <span>${isTargetAdm ? '<span class="adm-tag">ADMIN</span>' : ''}${cleanName} ${(isAdmin && d.s !== name && !isTargetAdm) ? `<span class="admin-action" onclick="openActionMenu(event, '${d.s}')">⚙️</span>` : ""}</span>
                <span class="tools">${(isAdmin || d.s === name) ? `<span class="tool-btn edit-icon" onclick="editMsg('${key}', '${d.c.replace(/'/g, "\\'")}')">🔧</span> <span class="tool-btn del-icon" onclick="del(event, '${key}')">x</span>` : ""}</span>
            </div>
            <div>${d.c}</div>
            <div class="msg-info"><span>${d.edited ? "(đã sửa)" : ""}</span><span>${new Date(d.t).getHours()}:${new Date(d.t).getMinutes().toString().padStart(2,'0')}</span></div>`;
        }
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function listen() {
        db.ref("messages").limitToLast(50).on("child_added", (s) => {
            renderMessage(s.key, s.val());
        });
        db.ref("messages").on("child_removed", (s) => { const el = document.getElementById("msg-" + s.key); if (el) el.remove(); });
        db.ref("messages").on("child_changed", (s) => { const el = document.getElementById("msg-" + s.key); if(el) el.innerHTML = "Tin nhắn đã được cập nhật/xóa"; });
    }

    function checkSavedLogin() {
        const saved = localStorage.getItem("chat_user_name");
        if (saved) {
            let rawName = saved.replace("ADMIN_", "");
            db.ref("admin_config").child(rawName).once("value", (snap) => {
                if (snap.exists()) { isAdmin = true; name = "ADMIN_" + rawName; document.getElementById('admin-status').innerText = "🛡️"; document.getElementById('btn-announcement').style.display = "block"; } else { isAdmin = false; name = rawName; }
                document.getElementById('login-overlay').classList.add('hidden');
            });
        }
    }

    function handleAuth() {
        const u = document.getElementById('auth-user').value.trim();
        const p = document.getElementById('auth-pass').value.trim();
        if(!u || !p) return alert("Nhập đủ thông tin!");
        
        if (isRegisterMode) {
            // Logic đăng ký tài khoản thường
            db.ref("users").child(u).once("value", (snap) => {
                if(snap.exists()) return alert("Tài khoản đã tồn tại!");
                db.ref("users").child(u).set({ pass: p }, (err) => {
                    if(!err) { alert("Đăng ký thành công!"); isRegisterMode = false; document.getElementById('auth-title').innerText = "Đăng Nhập"; }
                });
            });
        } else {
            // Logic đăng nhập
            db.ref("admin_config").child(u).once("value", (snap) => {
                if(snap.val() && snap.val().pass === p) { localStorage.setItem("chat_user_name", "ADMIN_" + u); location.reload(); }
                else { db.ref("users").child(u).once("value", (s) => { if(s.val() && s.val().pass === p) { localStorage.setItem("chat_user_name", u); location.reload(); } else alert("Sai thông tin!"); }); }
            });
        }
    }

    // --- CÁC HÀM CHO ADMIN ĐÃ ĐƯỢC BỔ SUNG BIẾN MẤT ---

    // 1. Tặng quyền admin cho user khác
    function setAdminRole() {
        if (!selectedUser) return;
        if (confirm(`Bạn chắc chắn muốn nâng cấp ${selectedUser} lên ADMIN?`)) {
            // Lấy pass cũ của user đó từ nhánh 'users' qua nhánh 'admin_config'
            db.ref("users").child(selectedUser).once("value", (snap) => {
                let userPass = "123456"; // Mật khẩu mặc định nếu user là khách ẩn danh không có pass
                if (snap.exists() && snap.val().pass) {
                    userPass = snap.val().pass;
                }
                db.ref("admin_config").child(selectedUser).set({ pass: userPass }).then(() => {
                    alert(`Đã cấp quyền Admin thành công cho ${selectedUser}!`);
                    document.getElementById('action-modal').classList.add('hidden');
                });
            });
        }
    }

    // 2. Gửi thông báo loa phát thanh (Nút 📢 trên header)
    function adminSendAnnouncement() {
        if (!isAdmin) return;
        const msgText = prompt("Nhập nội dung thông báo toàn phòng chat:");
        if (msgText && msgText.trim() !== "") {
            db.ref("messages").push().set({
                s: name,
                c: msgText.trim(),
                t: Date.now(),
                type: 'alert' // Định dạng loa thông báo màu vàng
            });
        }
    }

    function loginAnonymous() { localStorage.setItem("chat_user_name", "Khách_" + Math.floor(1000 + Math.random() * 9000)); location.reload(); }
    function send() { const m = document.getElementById('msg'); if(!m.value.trim() || isBanned) return; db.ref("messages").push().set({ s: name, c: m.value, t: Date.now(), type: 'text' }); m.value = ""; }
    function logout() { localStorage.removeItem("chat_user_name"); location.reload(); }
    function banUser(min) { db.ref("banned_users").child(selectedUser).set(Date.now() + (min * 60 * 1000)); document.getElementById('action-modal').classList.add('hidden'); }
    function openActionMenu(e, u) { e.stopPropagation(); selectedUser = u; document.getElementById('target-name').innerText = u; document.getElementById('action-modal').classList.remove('hidden'); }
    function del(e, id) { e.stopPropagation(); if(confirm("Xóa?")) db.ref("messages").child(id).remove(); }
    function editMsg(id, old) { const n = prompt("Sửa:", old); if(n && n!==old) db.ref("messages").child(id).update({ c: n, edited: true }); }
    function switchAuthMode() { isRegisterMode = !isRegisterMode; document.getElementById('auth-title').innerText = isRegisterMode ? "Đăng Ký" : "Đăng Nhập"; }
    function checkBanStatus() { if(name) db.ref("banned_users").child(name).on("value", (snap) => { if(snap.val() && snap.val() > Date.now()) { isBanned=true; document.getElementById('ban-info').style.display="block"; document.getElementById('ban-info').innerText="BẠN BỊ KHOÁ!"; } }); }
    
    initApp();
</script>
</body>
</html>
