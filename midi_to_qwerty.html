<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIDI to Roblox QWERTY Converter</title>
    <script src="https://unpkg.com/@tonejs/midi"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24;
            color: #fff;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            text-align: center;
        }
        h2 { color: #4caf50; }
        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            margin: 20px;
        }
        .btn {
            border: 2px solid #4caf50;
            color: #fff;
            background-color: transparent;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover {
            background-color: #4caf50;
        }
        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }
        textarea {
            width: 100%;
            height: 300px;
            background-color: #2d2d34;
            color: #00ff66;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 15px;
            font-family: monospace;
            font-size: 16px;
            resize: vertical;
            box-sizing: border-box;
        }
        .info {
            color: #aaa;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h2>Chuyển đổi MIDI sang Phím Đàn Roblox (QWERTY)</h2>
    <p>Chọn một file .mid để tự động dịch thành chuỗi ký tự chơi đàn</p>

    <div class="upload-btn-wrapper">
        <button class="btn">Chọn File MIDI</button>
        <input type="file" id="midi-file" accept=".mid,.midi" />
    </div>

    <br>
    <textarea id="output" placeholder="Ký tự nhạc (Sheet) sẽ xuất hiện ở đây..." readonly></textarea>
    <p class="info">Lưu ý: Các ký tự viết hoa (hoặc ký tự đặc biệt như !, @, $) đại diện cho phím đen (bấm giữ Shift khi chơi).</p>

    <script>
        // Bản đồ ánh xạ chính xác từ số nốt MIDI sang ký tự bàn phím ảo Roblox
        const midiMap = {
            // Phím trắng (Hàng dưới)
            36: "1", 38: "2", 40: "3", 41: "4", 43: "5", 45: "6", 47: "7", 48: "8", 50: "9", 52: "0",
            53: "q", 55: "w", 57: "e", 59: "r", 60: "t", 62: "y", 64: "u", 65: "i", 67: "o", 69: "p",
            71: "a", 72: "s", 74: "d", 76: "f", 77: "g", 79: "h", 81: "j", 83: "k", 84: "l", 86: "z",
            88: "x", 89: "c", 91: "v", 93: "b", 95: "n", 96: "m",

            // Phím đen (Hàng trên - Đã sửa lỗi hiển thị ký tự đặc biệt)
            37: "!", 39: "@", 42: "$", 44: "%", 46: "^", 49: "*", 51: "(",
            
            // Các phím đen dạng chữ in hoa
            54: "Q", 56: "W", 58: "E", 61: "T", 63: "Y", 66: "I", 68: "O", 70: "P",
            73: "S", 75: "D", 78: "G", 80: "H", 82: "J", 85: "L", 87: "Z",
            90: "C", 92: "V", 94: "B"
        };

        document.getElementById('midi-file').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function(event) {
                try {
                    const midi = new Midi(event.target.result);
                    let allNotes = [];

                    midi.tracks.forEach(track => {
                        track.notes.forEach(note => {
                            allNotes.push({
                                time: note.time,
                                midi: note.midi
                            });
                        });
                    });

                    // Sắp xếp các nốt theo trình tự thời gian bản nhạc
                    allNotes.sort((a, b) => a.time - b.time);

                    let sheetResult = [];
                    let lastTime = 0;
                    const tolerance = 0.08; // Khoảng thời gian cho phép để nhận diện hợp âm (chơi cùng lúc)
                    let currentChord = [];

                    for (let i = 0; i < allNotes.length; i++) {
                        let currentNote = allNotes[i];
                        let key = midiMap[currentNote.midi];

                        // Tự động dịch quãng tám nếu nốt nhạc vượt tầm của đàn 61 phím
                        if (!key) {
                            let adjustedMidi = currentNote.midi;
                            while (adjustedMidi < 36) adjustedMidi += 12;
                            while (adjustedMidi > 96) adjustedMidi -= 12;
                            key = midiMap[adjustedMidi] || "";
                        }

                        if (!key) continue;

                        // Cơ chế xử lý hợp âm và nốt đơn lẻ
                        if (Math.abs(currentNote.time - lastTime) <= tolerance) {
                            if (!currentChord.includes(key)) {
                                currentChord.push(key);
                            }
                        } else {
                            if (currentChord.length > 0) {
                                if (currentChord.length > 1) {
                                    sheetResult.push("[" + currentChord.join("") + "]");
                                } else {
                                    sheetResult.push(currentChord[0]);
                                }
                            }
                            currentChord = [key];
                            lastTime = currentNote.time;
                        }
                    }

                    // Đẩy nốt hoặc hợp âm cuối cùng vào danh sách
                    if (currentChord.length > 0) {
                        if (currentChord.length > 1) {
                            sheetResult.push("[" + currentChord.join("") + "]");
                        } else {
                            sheetResult.push(currentChord[0]);
                        }
                    }

                    // Hiển thị chuỗi sheet kết quả ngăn cách bằng dấu cách rõ ràng
                    document.getElementById('output').value = sheetResult.join(" ");

                } catch (error) {
                    alert("Có lỗi xảy ra khi đọc file MIDI! Vui lòng thử lại bằng file khác.");
                    console.error(error);
                }
            };

            reader.readAsArrayBuffer(file);
        });
    </script>
</body>
</html>
